<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 1600px; height: 900px; overflow: hidden; background: transparent; }
</style>
</head>
<body>
  <!-- Thermal-flow backdrop for the ProductionProof section.
       Isotherm contour field warped by turbulence — reads as an infrared
       flow map. Transparent base so it layers over the page bg; final
       subtlety is controlled by CSS opacity at the usage site. -->
  <svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="warp" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.0035 0.006" numOctaves="3" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="90" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="warp2" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.0028 0.0045" numOctaves="3" seed="23" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="130" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <radialGradient id="hotspotA" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#C85F2A" stop-opacity=".10"/>
        <stop offset="55%" stop-color="#B87333" stop-opacity=".045"/>
        <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="hotspotB" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0%" stop-color="#D4AF37" stop-opacity=".08"/>
        <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- diffuse heat plumes -->
    <ellipse cx="350" cy="620" rx="480" ry="340" fill="url(#hotspotA)"/>
    <ellipse cx="1280" cy="240" rx="520" ry="380" fill="url(#hotspotB)"/>

    <!-- contour field 1: centered on lower-left plume -->
    <g filter="url(#warp)" stroke="#D4AF37" fill="none">
      <ellipse cx="350" cy="620" rx="120" ry="90"  stroke-opacity=".14" stroke-width="1.3"/>
      <ellipse cx="350" cy="620" rx="210" ry="160" stroke-opacity=".11" stroke-width="1.2"/>
      <ellipse cx="350" cy="620" rx="310" ry="235" stroke-opacity=".085" stroke-width="1.1"/>
      <ellipse cx="350" cy="620" rx="420" ry="320" stroke-opacity=".06"  stroke-width="1"/>
      <ellipse cx="350" cy="620" rx="540" ry="410" stroke-opacity=".04"  stroke-width="1"/>
      <ellipse cx="350" cy="620" rx="670" ry="510" stroke-opacity=".025" stroke-width="1"/>
    </g>

    <!-- contour field 2: copper, upper-right, different warp -->
    <g filter="url(#warp2)" stroke="#B87333" fill="none">
      <ellipse cx="1280" cy="240" rx="140" ry="100" stroke-opacity=".12" stroke-width="1.2"/>
      <ellipse cx="1280" cy="240" rx="250" ry="185" stroke-opacity=".09" stroke-width="1.1"/>
      <ellipse cx="1280" cy="240" rx="370" ry="280" stroke-opacity=".065" stroke-width="1"/>
      <ellipse cx="1280" cy="240" rx="500" ry="385" stroke-opacity=".04"  stroke-width="1"/>
      <ellipse cx="1280" cy="240" rx="640" ry="500" stroke-opacity=".025" stroke-width="1"/>
    </g>

    <!-- sparse flow streaks: heat advection between the plumes -->
    <g filter="url(#warp)" stroke="#D8D2C2" fill="none">
      <path d="M 200 200 C 500 260 800 180 1100 260 C 1250 300 1400 280 1560 330" stroke-opacity=".035" stroke-width="1"/>
      <path d="M 100 430 C 450 480 750 380 1080 470 C 1280 520 1440 490 1600 560" stroke-opacity=".03" stroke-width="1"/>
      <path d="M 60 760 C 420 800 760 700 1120 790 C 1320 840 1460 800 1600 850" stroke-opacity=".035" stroke-width="1"/>
    </g>
  </svg>
</body>
</html>
