<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }

  body {
    background: #050407;
    position: relative;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* faint instrument grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(216,210,194,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(216,210,194,.022) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* depth lift behind the mark */
  .lift {
    position: absolute; left: -120px; top: 50%; transform: translateY(-50%);
    width: 760px; height: 760px;
    background: radial-gradient(circle, rgba(212,175,55,.07) 0%, rgba(184,115,51,.03) 45%, transparent 68%);
  }

  .isotherms { position: absolute; left: 0; top: 0; }

  .content {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    padding: 0 96px 0 472px;
    z-index: 2;
  }

  .wordmark {
    font-size: 96px; font-weight: 700; letter-spacing: -0.035em; line-height: 1;
    background: linear-gradient(120deg, #ECE6D8 0%, #D4AF37 55%, #C9A84C 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    margin-top: 18px;
    font-size: 34px; font-weight: 500; letter-spacing: -0.01em;
    color: #D8D2C2;
  }

  .formula {
    margin-top: 30px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; line-height: 1.7; color: #8A6F2E; letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .formula b { color: #D4AF37; font-weight: 500; }

  .rule {
    margin-top: 34px; width: 560px; height: 1px;
    background: linear-gradient(90deg, rgba(212,175,55,.45), rgba(212,175,55,.06));
    position: relative;
  }
  /* instrument tick marks on the rule */
  .rule::before {
    content: ''; position: absolute; left: 0; top: -3px; width: 560px; height: 7px;
    background-image: linear-gradient(90deg, rgba(212,175,55,.4) 1px, transparent 1px);
    background-size: 70px 7px;
  }

  .footer {
    margin-top: 30px;
    display: flex; align-items: center; gap: 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 19px;
  }
  .pip {
    padding: 11px 20px; border-radius: 6px;
    border: 1px solid rgba(212,175,55,.28);
    background: rgba(14,12,18,.85);
    color: #ECE6D8;
  }
  .pip span { color: #8A6F2E; margin-right: 10px; }
  .domain { color: #6b6478; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="lift"></div>

  <!-- θ mark with isotherm contours: concentric, slightly irregular closed curves
       radiating from the glyph — the thermal-map identity -->
  <svg class="isotherms" width="760" height="630" viewBox="0 0 760 630" fill="none">
    <g transform="translate(252, 315)">
      <!-- contours: hand-irregular ellipses, fading outward -->
      <path d="M -150 8 C -152 -88 -78 -158 4 -154 C 92 -150 154 -82 150 4 C 146 92 80 152 -6 150 C -90 148 -148 96 -150 8 Z"
            stroke="#D4AF37" stroke-opacity=".34" stroke-width="1.4"/>
      <path d="M -196 -4 C -192 -118 -104 -202 8 -198 C 124 -194 202 -104 196 8 C 190 124 100 198 -10 194 C -116 190 -200 104 -196 -4 Z"
            stroke="#D4AF37" stroke-opacity=".22" stroke-width="1.2"/>
      <path d="M -244 10 C -248 -142 -132 -250 6 -246 C 152 -242 250 -130 244 12 C 238 152 124 246 -14 242 C -148 238 -240 146 -244 10 Z"
            stroke="#B87333" stroke-opacity=".16" stroke-width="1.1"/>
      <path d="M -294 -6 C -288 -174 -158 -298 12 -294 C 180 -290 298 -158 292 10 C 286 178 152 296 -16 290 C -178 284 -300 156 -294 -6 Z"
            stroke="#D4AF37" stroke-opacity=".10" stroke-width="1"/>
      <path d="M -344 8 C -340 -204 -186 -348 10 -344 C 212 -340 348 -184 344 12 C 340 210 180 346 -18 342 C -210 338 -348 200 -344 8 Z"
            stroke="#D4AF37" stroke-opacity=".055" stroke-width="1"/>

      <!-- the θ glyph, scaled from favicon geometry (ellipse + crossbar) -->
      <ellipse cx="0" cy="0" rx="84" ry="114" stroke="#D4AF37" stroke-width="22"/>
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#D4AF37" stroke-width="22" stroke-linecap="round"/>
    </g>
  </svg>

  <div class="content">
    <div>
      <div class="wordmark">Theta</div>
      <div class="tagline">GPU thermal forensics</div>
      <div class="formula"><b>R_θ = ΔT / P</b> — rising thermal resistance at steady power<br/>means cooling is degrading. Temperature alone can't tell you.</div>
      <div class="rule"></div>
      <div class="footer">
        <div class="pip"><span>$</span>pip install runtheta</div>
        <div class="domain">runtheta.com</div>
      </div>
    </div>
  </div>
</body>
</html>
